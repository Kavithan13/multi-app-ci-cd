options:
  logging: CLOUD_LOGGING_ONLY

steps:

# ✅ Build Java image
- name: gcr.io/cloud-builders/docker
  id: build-java
  args:
    - build
    - -t
    - us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/java-app:latest
    - ./java-app

# ✅ Build Python image
- name: gcr.io/cloud-builders/docker
  id: build-python
  args:
    - build
    - -t
    - us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/python-app:latest
    - ./python-app

# ✅ Deploy Java (WAIT for build)
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  waitFor: ["build-java"]
  args:
    - run
    - deploy
    - java-service
    - --image=us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/java-app:latest
    - --region=us-central1
    - --platform=managed
    - --allow-unauthenticated

# ✅ Deploy Python (WAIT for build)
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  waitFor: ["build-python"]
  args:
    - run
    - deploy
    - python-service
    - --image=us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/python-app:latest
    - --region=us-central1
    - --platform=managed
    - --allow-unauthenticated

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/java-app:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/python-app:latest
